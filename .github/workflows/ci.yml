name: CI Pipeline Demo

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run test
        run: npm test

      - name: Build project
        run: npm run build

      - name: Simulate deploy
        run: echo "Deploy success"

      - name: Build Docker image
        run: docker build -t ci-demo .